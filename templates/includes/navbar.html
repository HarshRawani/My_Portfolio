{% load static %}
<nav class="pf-nav">
  <a class="pf-nav__brand" href="{% url 'home' %}">
    <span class="pf-nav__brand-dot"></span>
    HKR
  </a>

  <button class="pf-nav__toggle" id="navToggle" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>

  <ul class="pf-nav__links" id="navLinks">
    <li><a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Projects</a></li>
    <li><a href="{% url 'about' %}" class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a></li>
    <li><a href="{% url 'contact' %}" class="pf-nav__cta">Hire Me</a></li>
    {% if resume %}
      <li><a href="{{ resume.file.url }}" download class="btn-pf btn-pf--download">↓ Resume</a></li>
    {% endif %}
  </ul>
</nav>

<script>
const toggle = document.getElementById('navToggle');
const links  = document.getElementById('navLinks');
toggle.addEventListener('click', () => links.classList.toggle('open'));
links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => links.classList.remove('open')));
</script>
