{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
  .gallery-card { border:none; transition:transform .25s,box-shadow .25s; }
  .gallery-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.15)!important; }
  .gallery-main-wrap:hover .gallery-main-img { transform:scale(1.04); }
  .thumbnail-strip::-webkit-scrollbar { height:4px; }
  .thumbnail-strip::-webkit-scrollbar-thumb { background:#aaa;border-radius:2px; }
  .thumb-img:hover { outline:2px solid #0d6efd; }

  #gallery-lightbox {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.88); z-index:9999;
    align-items:center; justify-content:center; flex-direction:column;
  }
  #gallery-lightbox.active { display:flex; }
  #lb-img-wrap { position:relative; max-width:90vw; max-height:75vh; display:flex; align-items:center; justify-content:center; }
  #lb-img { max-width:90vw; max-height:72vh; border-radius:8px; box-shadow:0 4px 32px rgba(0,0,0,.6); object-fit:contain; transition:opacity .2s; }
  .lb-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.15); border:none; border-radius:50%; width:44px; height:44px; font-size:1.4rem; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:2; }
  .lb-arrow:hover { background:rgba(255,255,255,.3); }
  #lb-prev { left:-56px; } #lb-next { right:-56px; }
  #lb-caption { color:#eee; font-size:.95rem; margin-top:12px; max-width:80vw; text-align:center; }
  #lb-counter { color:#aaa; font-size:.8rem; margin-top:4px; }
  #lb-close { position:fixed; top:18px; right:24px; background:none; border:none; font-size:2rem; color:#fff; cursor:pointer; z-index:10000; }
  #lb-close:hover { color:#f00; }
  #lb-dots { margin-top:10px; display:flex; gap:6px; }
  .lb-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.35); cursor:pointer; transition:background .2s; }
  .lb-dot.active { background:#fff; }
</style>

<div class="container mt-5 mb-5">
  <h2 class="fw-bold mb-4">Projects</h2>
  {% if projects %}
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for item in projects %}
    <div class="col">
      {% include "includes/gallery.html" with project=item %}
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-muted">No projects yet.</p>
  {% endif %}
</div>

<div id="gallery-lightbox" role="dialog" aria-modal="true">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <div id="lb-img-wrap">
    <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)">&#8592;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-arrow" id="lb-next" onclick="lbNav(1)">&#8594;</button>
  </div>
  <div id="lb-caption"></div>
  <div id="lb-counter"></div>
  <div id="lb-dots"></div>
</div>

<script>
(function(){
  var lb=document.getElementById('gallery-lightbox'),
      lbImg=document.getElementById('lb-img'),
      lbCap=document.getElementById('lb-caption'),
      lbCtr=document.getElementById('lb-counter'),
      lbDots=document.getElementById('lb-dots'),
      _proj=null, _idx=0;

  window.openLightbox=function(id,idx){
    var d=(window._galleryData||{})[id];
    if(!d||!d.images.length)return;
    _proj=d; _idx=idx; _render();
    lb.classList.add('active');
    document.body.style.overflow='hidden';
  };
  window.closeLightbox=function(){
    lb.classList.remove('active');
    document.body.style.overflow='';
    lbImg.src='';
  };
  window.lbNav=function(dir){
    if(!_proj)return;
    _idx=(_idx+dir+_proj.images.length)%_proj.images.length;
    _render();
  };
  function _render(){
    var imgs=_proj.images, item=imgs[_idx];
    lbImg.style.opacity='0';
    setTimeout(function(){ lbImg.src=item.url; lbImg.alt=item.caption; lbImg.style.opacity='1'; },100);
    lbCap.textContent=item.caption||'';
    lbCtr.textContent=(_idx+1)+' / '+imgs.length;
    lbDots.innerHTML='';
    imgs.forEach(function(_,i){
      var d=document.createElement('span');
      d.className='lb-dot'+(i===_idx?' active':'');
      d.onclick=(function(i){return function(){_idx=i;_render();};})(i);
      lbDots.appendChild(d);
    });
    document.getElementById('lb-prev').style.display=imgs.length>1?'':'none';
    document.getElementById('lb-next').style.display=imgs.length>1?'':'none';
  }
  document.addEventListener('keydown',function(e){
    if(!lb.classList.contains('active'))return;
    if(e.key==='Escape')closeLightbox();
    else if(e.key==='ArrowLeft')lbNav(-1);
    else if(e.key==='ArrowRight')lbNav(1);
  });
  lb.addEventListener('click',function(e){ if(e.target===lb)closeLightbox(); });
})();
</script>

{% endblock content %}
