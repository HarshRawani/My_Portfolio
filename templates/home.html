{% extends "base.html" %}

{% block content %}
{% load static %}

<div class="container mt-4">
  <div class="row g-4">

    {% for item in projects %}
    <div class="col-md-4 d-flex">
      <div class="card w-100">

        {% if item.image_url %}
          <img src="{{ item.image_url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
        {% else %}
          <img src="{% static 'images/default.jpg' %}" class="card-img-top" style="height: 200px; object-fit: cover;">
        {% endif %}        
        
        <div class="card-body">
          <h5>{{ item.title }}</h5>
          <p>{{ item.description }}</p>
          {% if item.link %}
            <a href="{{ item.link }}" target="_blank" class="btn btn-primary">
              View Project
            </a>
          {% else %}
            <a href="{% url 'home' %}" class="btn btn-secondary">
              View Project
            </a>
          {% endif %}
        </div>
      </div>
    </div>
    {% endfor %}

  </div>
</div>

{% endblock content %}
